# Build Separator Dashboard Docker images and export as .tar for Portainer.
#
# Builds two split images (separator-backend, separator-frontend) directly
# from their per-service Dockerfiles — NOT via `docker compose build`. The
# compose files reference pre-built images and don't carry `build:`
# directives, so `compose build` would have nothing to do.
#
# Manual run: Actions → Build dashboard images → Run workflow
# Artifact:   separator-dashboard-images.tar (load with `docker load -i`)

name: Build dashboard images

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]
    paths:
      - 'separator-energy-dashboard/**'

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: separator-energy-dashboard/backend
          file: separator-energy-dashboard/backend/Dockerfile
          tags: separator-backend:latest
          load: true                # Keep in the runner's local daemon for `docker save`
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: separator-energy-dashboard/frontend
          file: separator-energy-dashboard/frontend/Dockerfile
          tags: separator-frontend:latest
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: docker images separator-backend separator-frontend

      - name: Export to tar
        run: |
          cd separator-energy-dashboard
          docker save -o separator-dashboard-images.tar \
            separator-backend:latest \
            separator-frontend:latest
          ls -lh separator-dashboard-images.tar

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: separator-dashboard-images
          path: separator-energy-dashboard/separator-dashboard-images.tar
          retention-days: 30
