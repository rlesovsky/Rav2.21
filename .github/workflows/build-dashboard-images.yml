# Build the single-container Separator Dashboard image and export as .tar
# for Portainer.
#
# Production runs the single-image deploy (FastAPI serves both the API and
# the React frontend on port 3030). The image name + tag in this workflow
# matches `image: separator-dashboard:v2.26` in docker-compose.yml.
#
# Manual run: Actions → Build dashboard images → Run workflow
# Artifact:   separator-dashboard-v2.26.tar (~150 MB)
#
# Deployment recipe (after this workflow finishes green):
#   gh run download <run-id> --name separator-dashboard
#   scp separator-dashboard-v2.26.tar user@server:/tmp/
#   # On the server:
#   docker load -i /tmp/separator-dashboard-v2.26.tar
#   # Then redeploy via Portainer or:
#   #   docker compose -f docker-compose.yml up -d

name: Build dashboard images

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]
    paths:
      - 'separator-energy-dashboard/**'

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build single-container image
        uses: docker/build-push-action@v5
        with:
          # The top-level Dockerfile builds React (Node stage) then bundles
          # it into the FastAPI image (Python stage), serving everything from
          # /app on port 3030. Build context must be the dashboard root so
          # the Dockerfile can `COPY frontend/...` and `COPY backend/...`.
          context: separator-energy-dashboard
          file: separator-energy-dashboard/Dockerfile
          platforms: linux/amd64
          tags: |
            separator-dashboard:v2.26
            separator-dashboard:latest
          load: true                # Keep in the runner's local daemon for `docker save`
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image loaded into daemon
        run: |
          docker image inspect separator-dashboard:v2.26 \
            --format '{{.Id}} ({{.Architecture}}/{{.Os}}, size={{.Size}})'

      - name: Export to tar
        run: |
          cd separator-energy-dashboard
          # Save the image with both tags so consumers can reference either.
          docker save -o separator-dashboard-v2.26.tar \
            separator-dashboard:v2.26 \
            separator-dashboard:latest
          ls -lh separator-dashboard-v2.26.tar

      - name: Upload tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: separator-dashboard
          path: separator-energy-dashboard/separator-dashboard-v2.26.tar
          retention-days: 30
