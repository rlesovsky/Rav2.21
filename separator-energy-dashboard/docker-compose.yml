# =============================================================================
# docker-compose.yml — Separator Energy Cost Dashboard
# Driftwood Dairy | El Monte, CA | Texas Automation Systems
#
# Single container — FastAPI serves both the API and React frontend.
# Routed through Traefik at separator.tse.prod.
#
# Deployment:
#   1. Download separator-dashboard-v2.22.tar from the latest GitHub Actions
#      "Build dashboard images" run (or build locally — see top-level README).
#   2. In Portainer → Images → Import → upload the tar.
#   3. In Portainer → Stacks → deploy/update with this file.
# =============================================================================

services:
  separator-dashboard:
    image: separator-dashboard:v2.22
    container_name: separator-dashboard
    restart: unless-stopped
    networks:
      - infrastructure
    ports:
      - "3030:3030"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      # --- i3X consumer (off by default — flip to true after smoke test) ---
      # When false: dashboard reads from Timebase via the legacy REST API
      # (TIMEBASE_HOST/PORT/DATASET below). When true: uses the i3X-flavored
      # API at I3X_BASE_URL with the elementId-based catalog.
      - USE_I3X=false
      - I3X_BASE_URL=http://192.254.155.2:4511
      - I3X_DATASET=Driftwood Historian
      - I3X_SEPARATOR_BASE_PATH=Driftwood Dairy/El Monte CA/Raw Side/Seperator/1/Edge
      - I3X_TAG_MOTOR_AMPS=Motor Amps
      - I3X_TAG_RUNNING=Running
      - I3X_TAG_CIP=CIP
      - I3X_TAG_PROCESS=Process
      - I3X_TIMEOUT_SECONDS=10

      # --- Legacy fallback (used when USE_I3X=false) ---
      - TIMEBASE_HOST=192.254.155.2
      - TIMEBASE_PORT=4511
      - TIMEBASE_DATASET=Driftwood Historian
      - MIN_GOOD_QUALITY=192

      # --- Continuous processing service (Phase 2) ---
      # Background loop that holds LatestState in memory and maintains the
      # 24h ring buffer feeding /api/energy/current and /api/i3x/v1/objects/value.
      - PROCESSING_INTERVAL_SECONDS=5
      - PROCESSING_BUFFER_MINUTES=1440
      - STALE_THRESHOLD_SECONDS=60

      # --- App / facility ---
      - FACILITY_TIMEZONE=US/Pacific
      - DEFAULT_RATE_PER_KWH=0.30
      - VOLTAGE=460
      - POWER_FACTOR=0.88
      - LOOKBACK_DAYS=7

      # --- SCE TOU-GS-2 rates (override per real bill) ---
      - TOU_SUMMER_ON_PEAK=0.38
      - TOU_SUMMER_MID_PEAK=0.28
      - TOU_SUMMER_OFF_PEAK=0.18
      - TOU_WINTER_MID_PEAK=0.30
      - TOU_WINTER_OFF_PEAK=0.22
      - TOU_WINTER_SUPER_OFF_PEAK=0.16

      - TZ=America/Los_Angeles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.separator.rule=Host(`separator.tse.prod`)"
      - "traefik.http.routers.separator.entrypoints=web"
      - "traefik.http.services.separator.loadbalancer.server.port=3030"
      - "traefik.docker.network=infrastructure"

networks:
  infrastructure:
    external: true
