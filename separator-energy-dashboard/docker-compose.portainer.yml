# =============================================================================
# docker-compose.portainer.yml — Use pre-loaded images (no build)
# Driftwood Dairy | Texas Automation Systems
#
# Use this in Portainer after loading separator-dashboard-images.tar:
#   docker load -i separator-dashboard-images.tar
#
# In Portainer: create Stack → paste this file → add env vars or .env.
# Ensure the "industry40" network exists on the server.
# =============================================================================

services:
  separator-backend:
    image: separator-backend:latest
    container_name: separator-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      # --- i3X consumer (off by default — flip to true after smoke test) ---
      - USE_I3X=${USE_I3X:-false}
      - I3X_BASE_URL=${I3X_BASE_URL:-http://timebase-historian:4511}
      - I3X_DATASET=${I3X_DATASET:-Driftwood Historian}
      - I3X_SEPARATOR_BASE_PATH=${I3X_SEPARATOR_BASE_PATH:-Driftwood Dairy/El Monte CA/Raw Side/Seperator/1/Edge}
      - I3X_TAG_MOTOR_AMPS=${I3X_TAG_MOTOR_AMPS:-Motor Amps}
      - I3X_TAG_RUNNING=${I3X_TAG_RUNNING:-Running}
      - I3X_TAG_CIP=${I3X_TAG_CIP:-CIP}
      - I3X_TAG_PROCESS=${I3X_TAG_PROCESS:-Process}
      - I3X_TIMEOUT_SECONDS=${I3X_TIMEOUT_SECONDS:-10}
      # --- Legacy fallback (used when USE_I3X=false) ---
      - TIMEBASE_HOST=${TIMEBASE_HOST:-timebase-historian}
      - TIMEBASE_PORT=${TIMEBASE_PORT:-4511}
      - TIMEBASE_DATASET=${TIMEBASE_DATASET:-Driftwood Historian}
      - MIN_GOOD_QUALITY=${MIN_GOOD_QUALITY:-192}
      # --- Continuous processing service (Phase 2) ---
      - PROCESSING_INTERVAL_SECONDS=${PROCESSING_INTERVAL_SECONDS:-5}
      - PROCESSING_BUFFER_MINUTES=${PROCESSING_BUFFER_MINUTES:-1440}
      - STALE_THRESHOLD_SECONDS=${STALE_THRESHOLD_SECONDS:-60}
      # --- App ---
      - FACILITY_TIMEZONE=${FACILITY_TIMEZONE:-US/Pacific}
      - DEFAULT_RATE_PER_KWH=${DEFAULT_RATE_PER_KWH:-0.30}
      - VOLTAGE=${VOLTAGE:-460}
      - POWER_FACTOR=${POWER_FACTOR:-0.88}
      - LOOKBACK_DAYS=${LOOKBACK_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - TOU_SUMMER_ON_PEAK=${TOU_SUMMER_ON_PEAK:-0.38}
      - TOU_SUMMER_MID_PEAK=${TOU_SUMMER_MID_PEAK:-0.28}
      - TOU_SUMMER_OFF_PEAK=${TOU_SUMMER_OFF_PEAK:-0.18}
      - TOU_WINTER_MID_PEAK=${TOU_WINTER_MID_PEAK:-0.30}
      - TOU_WINTER_OFF_PEAK=${TOU_WINTER_OFF_PEAK:-0.22}
      - TOU_WINTER_SUPER_OFF_PEAK=${TOU_WINTER_SUPER_OFF_PEAK:-0.16}
      - TZ=${TZ:-America/Los_Angeles}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - industry40

  separator-frontend:
    image: separator-frontend:latest
    container_name: separator-frontend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    depends_on:
      separator-backend:
        condition: service_healthy
    networks:
      - industry40

networks:
  industry40:
    external: true
